name: Build APK & Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: List repo structure
        run: ls -la && ls -la app/ || echo "no app dir"

      - name: Install dependencies
        run: flutter pub get
        working-directory: app

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses 2>/dev/null || true

      - name: Build APK
        run: flutter build apk --release --split-per-abi
        working-directory: app

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: app/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get
        working-directory: app

      - name: Build Windows
        run: flutter build windows --release
        working-directory: app

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: app/build/windows/x64/runner/Release/
          retention-days: 30
